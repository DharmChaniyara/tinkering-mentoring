<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | Study Share</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <div class="login-container">
    <div class="glass login-card">
      <div class="brand" style="justify-content: center; margin-bottom: 24px;">
        StudyShare <span style="font-weight: 300; font-size: 20px; color: var(--text-muted);">Admin</span>
      </div>
      <h2>Welcome Back</h2>
      <p>Secure portal access</p>
      
      <form id="adminLoginForm">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="email" required placeholder="admin@example.com">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn-login" id="loginBtn">Authenticate</button>
        <div id="loginError"></div>
      </form>
    </div>
  </div>

  <script src="../js/auth.js"></script>
  <script>
    // Check if already logged in as admin
    const user = getUser();
    if (user && user.role === 'admin') {
      window.location.href = 'dashboard.html';
    }

    document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const errorDiv = document.getElementById('loginError');
      
      btn.textContent = 'Authenticating...';
      btn.disabled = true;
      errorDiv.style.display = 'none';

      try {
        const res = await fetch('/api/auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            action: 'login',
            email: document.getElementById('email').value,
            password: document.getElementById('password').value
          })
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || 'Login failed');
        }

        if (data.role !== 'admin') {
          throw new Error('Access Denied. You are not an administrator.');
        }

        // Use the auth.js handleAuthResponse
        handleAuthResponse(data, 'dashboard.html');
        
      } catch (err) {
        errorDiv.textContent = err.message;
        errorDiv.style.display = 'block';
        btn.textContent = 'Authenticate';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
