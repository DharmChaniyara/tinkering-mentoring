<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudyShare | Reset Password</title>
  <link rel="stylesheet" href="/css/style.css">
  <script>(function(){var t=localStorage.getItem('gsfc_theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
</head>
<body>
<div class="scanlines"></div>
<div class="auth-page">
  <div class="auth-card fade-in">
    <div class="auth-logo">
      <h1 class="gradient-text" style="font-size:1.8rem;">StudyShare</h1>
      <p style="color:var(--text-secondary);">Set new password</p>
    </div>
    <div class="glass-panel">
      <div id="alert-container" style="display:none;"></div>
      <div id="form-wrap">
        <form id="reset-form" novalidate>
          <input type="hidden" name="token" id="reset-token">
          <div class="form-group">
            <label>New Password</label>
            <input class="form-input" type="password" name="password" minlength="8" required placeholder="••••••••">
          </div>
          <div class="form-group">
            <label>Confirm Password</label>
            <input class="form-input" type="password" name="confirm" minlength="8" required placeholder="••••••••">
          </div>
          <button type="submit" class="cyber-btn cyber-btn-success cyber-btn-full">Update Password</button>
        </form>
      </div>
    </div>
    <div style="text-align:center;margin-top:1.5rem;">
      <button class="theme-toggle" onclick="toggleTheme()" id="themeToggle">☀️ Light</button>
    </div>
  </div>
</div>
<script src="/js/theme.js"></script>
<script src="/js/auth.js"></script>
<script>
  const params = new URLSearchParams(location.search);
  const token = params.get('token');

  if (!token) {
    showAlert('Missing reset token. Please use the link from your email.', 'error');
    document.getElementById('form-wrap').style.display = 'none';
  } else {
    document.getElementById('reset-token').value = token;
  }

  document.getElementById('reset-form')?.addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = e.target.querySelector('button[type="submit"]');
    btn.disabled = true; btn.textContent = 'Updating…';
    const body = Object.fromEntries(new FormData(e.target));
    const res = await fetch('/api/reset', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const data = await res.json();
    btn.disabled = false; btn.textContent = 'Update Password';
    if (res.ok) {
      showAlert(data.message, 'success');
      document.getElementById('form-wrap').innerHTML =
        `<div style="text-align:center;margin-top:1rem;"><a href="/?tab=login" class="cyber-btn cyber-btn-success">Go to Login</a></div>`;
    } else {
      showAlert(data.error, 'error');
    }
  });
</script>
</body>
</html>
