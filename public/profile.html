<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudyShare | My Profile</title>
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">
  <script>(function(){var t=localStorage.getItem('gsfc_theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
</head>
<body>
<div class="app-layout">
  <div id="sidebar-container"></div>
  <div class="main-content">
    <header class="topbar">
      <h2 style="font-size:1.1rem; font-weight:700;">My Contribution Profile</h2>
      <div style="flex:1"></div>
      <div class="topbar-actions">
        <button class="theme-toggle" onclick="toggleTheme()" id="themeToggle" style="background:rgba(255,255,255,0.05); border:1px solid var(--glass-border); display:flex; align-items:center; gap:8px; padding:6px 14px;">
          <span style="color:#fbbf24;">☀️</span> Light
        </button>
      </div>
    </header>

    <div class="page-content">
      <!-- Profile Hero Card -->
      <div class="profile-hero-card slide-in-up" style="background: radial-gradient(circle at top right, rgba(124, 58, 237, 0.15), transparent), var(--glass-bg); padding: 3rem 2rem; border-radius: 30px; border: 1px solid var(--glass-border); margin-bottom: 2.5rem; display: flex; align-items: center; gap: 3rem; position: relative; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.3);">
        <div style="position: absolute; top:0; left:0; right:0; height:1px; background: linear-gradient(90deg, transparent, var(--primary), transparent); opacity: 0.3;"></div>
        
        <div class="profile-avatar-wrap" style="position: relative;">
          <div id="profile-avatar" class="profile-avatar" style="width:160px; height:160px; border-radius:50%; border: 4px solid var(--primary); background: rgba(0,0,0,0.2); box-shadow: 0 0 40px var(--primary-glow); cursor: pointer; overflow: hidden; position: relative; z-index: 2; display: flex; align-items: center; justify-content: center;" onclick="document.getElementById('profilePicInput').click()">
            <span id="avatar-text" style="font-size: 4rem; font-weight: 800; color: var(--primary); display: flex; align-items: center; justify-content: center; height: 100%;">??</span>
          </div>
          <div style="position: absolute; inset: -10px; background: var(--primary-glow); border-radius: 50%; filter: blur(20px); opacity: 0.3; z-index: 1;"></div>
        </div>
        
        <input type="file" id="profilePicInput" style="display:none;" accept="image/png, image/jpeg, image/jpg" onchange="uploadProfilePic(event)">
        
        <div class="profile-main-info">
          <h1 id="profile-name" style="font-size: 3rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 4px;">Dharm Chaniyara</h1>
          <p id="profile-email" style="font-size: 1.1rem; color: var(--text-muted); margin-bottom: 1.5rem;">dharmchaniyara7368@gmail.com</p>
          
          <div style="display: flex; align-items: center; gap: 1rem;">
            <span id="profile-role" style="font-size: 1rem; font-weight: 700; color: #fff;">Student</span>
            <div id="user-rating-stars" style="display: flex; align-items: center; gap: 4px; color: #fbbf24; font-size: 1rem;">
              ⭐⭐⭐⭐⭐ <span style="color: var(--text-muted); margin-left: 4px; font-weight: 500;">(2)</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Stats Grid -->
      <div class="stats-grid stagger-children" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; margin-bottom: 3rem;">
        <div class="stat-card" style="background: rgba(124, 58, 237, 0.05); border: 1px solid var(--glass-border); padding: 2rem; border-radius: 20px; display: flex; flex-direction: column; align-items: flex-start; gap: 1rem;">
          <div style="width: 44px; height: 44px; background: rgba(124, 58, 237, 0.1); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem;">📤</div>
          <div>
            <div id="stat-uploads" style="font-size: 2.5rem; font-weight: 800; font-family: 'Outfit', sans-serif;">2</div>
            <div style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); font-weight: 700;">Docs Uploaded</div>
          </div>
        </div>
        
        <div class="stat-card" style="background: rgba(6, 182, 212, 0.05); border: 1px solid var(--glass-border); padding: 2rem; border-radius: 20px; display: flex; flex-direction: column; align-items: flex-start; gap: 1rem;">
          <div style="width: 44px; height: 44px; background: rgba(6, 182, 212, 0.1); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem;">⬇️</div>
          <div>
            <div id="stat-downloads" style="font-size: 2.5rem; font-weight: 800; font-family: 'Outfit', sans-serif;">0</div>
            <div style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); font-weight: 700;">Total Downloads</div>
          </div>
        </div>
        
        <div class="stat-card" style="background: rgba(251, 191, 36, 0.05); border: 1px solid var(--glass-border); padding: 2rem; border-radius: 20px; display: flex; flex-direction: column; align-items: flex-start; gap: 1rem;">
          <div style="width: 44px; height: 44px; background: rgba(251, 191, 36, 0.1); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem;">⭐</div>
          <div>
            <div id="stat-rating" style="font-size: 2.5rem; font-weight: 800; font-family: 'Outfit', sans-serif;">5</div>
            <div style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); font-weight: 700;">Student Rating</div>
          </div>
        </div>
      </div>

      <!-- Managed Resources Section -->
      <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 2rem;">
        <div style="display: flex; gap: 4px;">
          <div style="width: 4px; height: 24px; background: var(--primary); border-radius: 2px;"></div>
          <div style="width: 4px; height: 24px; background: var(--secondary); border-radius: 2px; opacity: 0.5;"></div>
        </div>
        <h2 style="font-size: 1.8rem; font-weight: 800; letter-spacing: -0.5px;">Managed Resources</h2>
      </div>

      <div class="glass-panel" style="padding:0; overflow:hidden; border-radius: 24px;">
        <div style="overflow-x: auto;">
          <table style="width:100%; border-collapse:collapse;">
            <thead style="background:rgba(0,0,0,0.3); border-bottom: 1px solid var(--glass-border);">
              <tr>
                <th style="padding:1.5rem; text-align:left; color:var(--text-muted); font-size:0.75rem; text-transform:uppercase; letter-spacing:1px;">Resource</th>
                <th style="padding:1.5rem; text-align:left; color:var(--text-muted); font-size:0.75rem; text-transform:uppercase; letter-spacing:1px;">Category</th>
                <th style="padding:1.5rem; text-align:left; color:var(--text-muted); font-size:0.75rem; text-transform:uppercase; letter-spacing:1px;">Downloads</th>
                <th style="padding:1.5rem; text-align:left; color:var(--text-muted); font-size:0.75rem; text-transform:uppercase; letter-spacing:1px;">Rating</th>
                <th style="padding:1.5rem; text-align:right; color:var(--text-muted); font-size:0.75rem; text-transform:uppercase; letter-spacing:1px;">Actions</th>
              </tr>
            </thead>
            <tbody id="uploads-table-body">
              <tr><td colspan="5" style="padding:3rem; text-align:center; color:var(--text-muted);">Fetching your resources...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
    </div>
  </div>
</div>
<!-- EDIT DOCUMENT MODAL -->
 <div id="editDocModal" class="modal-overlay">
   <div class="modal-content pop-in">
     <div class="modal-header" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem;">
       <h2 class="gradient-text">Edit Resource</h2>
       <button class="modal-close" onclick="closeEditModal()" style="background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:1.2rem;">✕</button>
     </div>
     <form id="editDocForm">
       <input type="hidden" id="edit_note_id">
       <div class="form-group">
         <label>Resource Title</label>
         <input type="text" id="edit_title" class="form-input" required>
       </div>
       <div class="form-group">
         <label>Category</label>
         <select id="edit_category" class="form-input" required>
           <option value="Notes">Study Notes</option>
           <option value="PYQs">Previous Year Questions (PYQs)</option>
           <option value="Assignments">Assignments / Labs</option>
         </select>
       </div>
       <div style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 1.5rem;">
         <button type="button" class="cyber-btn cyber-btn-ghost" onclick="closeEditModal()">Cancel</button>
         <button type="submit" class="cyber-btn cyber-btn-success">Save Changes</button>
       </div>
     </form>
   </div>
 </div>

 <!-- CROPPER MODAL -->
 <div id="cropModal" class="modal-overlay">
   <div class="modal-content pop-in" style="max-width: 600px;">
     <div class="modal-header" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem;">
       <h2 class="gradient-text">Crop Image</h2>
       <button class="modal-close" onclick="closeCropModal()" style="background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:1.2rem;">✕</button>
     </div>
     <div style="max-height: 400px; overflow: hidden; display: flex; justify-content: center; background: #000; border-radius: 8px;">
       <img id="imageToCrop" style="max-width: 100%; display: block;">
     </div>
     <div style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 1.5rem;">
       <button type="button" class="cyber-btn cyber-btn-ghost" onclick="closeCropModal()">Cancel</button>
       <button type="button" class="cyber-btn cyber-btn-success" onclick="executeCrop()">Crop & Save</button>
     </div>
   </div>
 </div>

 <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
 <script src="/js/theme.js"></script>
<script src="/js/auth.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', async () => {
    const user = requireAuth();
    if (!user) return;
    renderSidebar('profile');
    try {
      const res = await fetch('/api/auth_manager?action=profile', { headers: getAuthHeaders() });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      document.getElementById('profile-name').textContent = data.user.name;
      document.getElementById('profile-email').textContent = data.user.email;
      
      const avatarContainer = document.getElementById('profile-avatar');
      if (data.user.profile_pic) {
        avatarContainer.innerHTML = `<img src="${data.user.profile_pic}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
      } else {
        avatarContainer.innerHTML = `<span id="avatar-text">${(data.user.name || 'U').slice(0, 2).toUpperCase()}</span>`;
      }
      if (data.user.role === 'admin') document.getElementById('profile-role').style.display = 'inline-block';
      const stars = '⭐'.repeat(Math.round(data.stats.avgRating)) + '☆'.repeat(5 - Math.round(data.stats.avgRating));
      document.getElementById('user-rating-stars').textContent = `${stars} (${data.stats.avgRating})`;
      document.getElementById('stat-uploads').textContent = data.stats.uploadCount;
      document.getElementById('stat-downloads').textContent = data.stats.totalDownloads;
      document.getElementById('stat-rating').textContent = data.stats.avgRating;
      const tbody = document.getElementById('uploads-table-body');
      tbody.innerHTML = '';
      if (data.documents.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" style="padding:3rem; text-align:center; color:var(--text-muted);">No documents uploaded yet.</td></tr>';
      } else {
        data.documents.forEach(doc => {
          const stars = '⭐'.repeat(Math.round(doc.rating || 5)) + '☆'.repeat(5 - Math.round(doc.rating || 5));
          tbody.innerHTML += `
            <tr id="doc-row-${doc.id}" style="border-bottom:1px solid var(--glass-border); transition: background 0.3s;" onmouseover="this.style.background='rgba(255,255,255,0.02)'" onmouseout="this.style.background='transparent'">
              <td style="padding:1.5rem;">
                <a href="/view_document?id=${doc.id}" id="doc-title-${doc.id}" style="color:#fff; text-decoration:none; font-weight:600; display:block; margin-bottom:4px;">${escHtml(doc.title)}</a>
                <span style="font-size:0.75rem; color:var(--text-muted);">${escHtml(doc.subject_name)}</span>
              </td>
              <td style="padding:1.5rem;">
                <span class="file-badge">${escHtml(doc.category || 'Notes')}</span>
              </td>
              <td style="padding:1.5rem; font-weight:700; color:var(--text-muted);">${doc.download_count}</td>
              <td style="padding:1.5rem;">
                <div style="color:#fbbf24; font-size:0.85rem;">${stars}</div>
              </td>
              <td style="padding:1.5rem; text-align:right;">
                <div style="display:flex; gap:12px; justify-content:flex-end;">
                  <button onclick='openEditModal(${JSON.stringify(doc).replace(/'/g, "&apos;")})' class="cyber-btn cyber-btn-ghost" style="padding:8px 16px; font-size:0.75rem; border-radius:10px;">Edit</button>
                  <button onclick="confirmDelete(${doc.id})" class="cyber-btn cyber-btn-danger" style="padding:8px 16px; font-size:0.75rem; border-radius:10px;">Delete</button>
                </div>
              </td>
            </tr>
          `;
        });
      }
    } catch (err) {
      console.error(err);
      showToast('Failed to load profile data.', 'error');
    }
  });

  function openEditModal(doc) {
    document.getElementById('edit_note_id').value = doc.id;
    document.getElementById('edit_title').value = doc.title;
    document.getElementById('edit_category').value = doc.category || 'Notes';
    document.getElementById('editDocModal').classList.add('open');
  }

  function closeEditModal() {
    document.getElementById('editDocModal').classList.remove('open');
  }

  let cropper;

  function closeCropModal() {
    document.getElementById('cropModal').classList.remove('open');
    if (cropper) {
      cropper.destroy();
      cropper = null;
    }
    document.getElementById('profilePicInput').value = '';
  }

  function uploadProfilePic(event) {
    const file = event.target.files[0];
    if (!file) return;
    if (file.size > 5 * 1024 * 1024) {
      showToast('File size exceeds 5MB', 'error');
      event.target.value = '';
      return;
    }

    const reader = new FileReader();
    reader.onload = (e) => {
      const img = document.getElementById('imageToCrop');
      img.src = e.target.result;
      document.getElementById('cropModal').classList.add('open');
      
      if (cropper) cropper.destroy();
      cropper = new Cropper(img, {
        aspectRatio: 1,
        viewMode: 1,
        background: false,
        zoomable: true,
        dragMode: 'move',
        responsive: true,
        autoCropArea: 1,
        ready() {
          // Make the crop box circular in the UI
          const cropBox = document.querySelector('.cropper-face');
          if (cropBox) {
            cropBox.style.borderRadius = '50%';
          }
          const cropView = document.querySelector('.cropper-view-box');
          if (cropView) {
            cropView.style.borderRadius = '50%';
            cropView.style.outline = 'none';
            cropView.style.boxShadow = '0 0 0 4000px rgba(0, 0, 0, 0.5)';
          }
        }
      });
    };
    reader.readAsDataURL(file);
  }

  async function executeCrop() {
    if (!cropper) return;
    showToast('Uploading profile picture...', 'info');
    
    // Get cropped canvas
    const canvas = cropper.getCroppedCanvas({
      width: 256,
      height: 256,
    });
    
    // Convert to base64
    const base64Image = canvas.toDataURL('image/png');
    const fileBase64 = base64Image.split(',')[1];
    
    closeCropModal();

    try {
      const res = await fetch('/api/auth_manager', {
        method: 'POST',
        headers: getAuthHeaders(),
        body: JSON.stringify({ action: 'update_profile_pic', fileBase64, mimeType: 'image/png' })
      });
      const data = await res.json();
      if (res.ok) {
        showToast('Profile picture updated!', 'success');
        document.getElementById('profile-avatar').innerHTML = `<img src="${data.url}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
        if (data.token) {
          handleAuthResponse({ token: data.token, role: getUser().role }, false);
          renderSidebar('profile');
        }
      } else {
        if (data.error && data.error.includes('schema needs update')) {
          showToast('Database schema needs an update (profile_pic column missing).', 'error');
        } else {
          showToast(data.error || 'Upload failed', 'error');
        }
      }
    } catch (e) {
      showToast('Connection error', 'error');
    }
  }

  document.getElementById('editDocForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const id = document.getElementById('edit_note_id').value;
    const title = document.getElementById('edit_title').value;
    const category = document.getElementById('edit_category').value;

    try {
      const res = await fetch('/api/content', {
        method: 'POST',
        headers: getAuthHeaders(),
        body: JSON.stringify({ action: 'edit_note', note_id: id, title, category })
      });
      const result = await res.json();
      if (res.ok) {
        showToast('Resource updated successfully!', 'success');
        const titleEl = document.getElementById(`doc-title-${id}`);
        if (titleEl) titleEl.textContent = title;
        closeEditModal();
      } else {
        showToast(result.error || 'Update failed', 'error');
      }
    } catch (err) {
      showToast('Connection error', 'error');
    }
  });

  async function confirmDelete(id) {
    if (!confirm('Are you sure you want to delete this document?')) return;
    try {
      const res = await fetch('/api/content', {
        method: 'POST',
        headers: getAuthHeaders(),
        body: JSON.stringify({ action: 'delete_note', note_id: id })
      });
      const result = await res.json();
      if (res.ok) {
        showToast('Document deleted successfully.', 'success');
        const row = document.getElementById(`doc-row-${id}`);
        if (row) {
          row.style.opacity = '0';
          row.style.transform = 'translateX(-20px)';
          row.style.transition = 'all 0.5s ease';
          setTimeout(() => row.remove(), 500);
        }
      } else {
        showToast(result.error || 'Delete failed', 'error');
      }
    } catch (err) {
      showToast('Connection error', 'error');
    }
  }

</script>
</body>
</html>
