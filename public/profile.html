<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudyShare | My Profile</title>
  <link rel="stylesheet" href="/css/style.css">
  <script>(function(){var t=localStorage.getItem('gsfc_theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
</head>
<body>
<div class="app-layout">
  <div id="sidebar-container"></div>
  <div class="main-content">
    <header class="topbar">
      <div style="flex:1"></div>
      <div class="topbar-actions">
        <button class="theme-toggle" onclick="toggleTheme()" id="themeToggle">☀️</button>
      </div>
    </header>
    <div class="page-content">
      <div class="profile-header slide-in-up" style="display:flex; align-items:center; gap:2rem; margin-bottom:3rem; padding:2rem; background:var(--glass-bg); border-radius:24px; border:1px solid var(--glass-border);">
        <div class="profile-avatar" id="profile-avatar" style="width:120px; height:120px; background:var(--accent); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:3rem; font-weight:800; color:white; box-shadow: 0 0 20px var(--accent-glow);">
          ??
        </div>
        <div class="profile-info">
          <h1 id="profile-name" style="font-size:2.2rem; margin-bottom:8px;">Loading...</h1>
          <p id="profile-email" style="color:var(--text-secondary); margin-bottom:12px;">...</p>
          <div style="display:flex; gap:12px;">
            <span class="badge badge-admin" id="profile-role" style="display:none;">Admin</span>
            <div id="user-rating-stars" style="color:#fbbf24; font-size:1.1rem;"></div>
          </div>
        </div>
      </div>
      <div class="stats-row stagger-children" style="margin-bottom:3rem;">
        <div class="stat-card">
          <div class="stat-icon">📤</div>
          <div class="stat-value" id="stat-uploads">0</div>
          <div class="stat-label">Docs Uploaded</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">📥</div>
          <div class="stat-value" id="stat-downloads">0</div>
          <div class="stat-label">Total Downloads</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">⭐</div>
          <div class="stat-value" id="stat-rating">0.0</div>
          <div class="stat-label">Student Rating</div>
        </div>
      </div>
      <h2 style="margin-bottom:1.5rem;">My Uploaded Documents</h2>
      <div class="glass-panel" style="padding:0; overflow:hidden;">
        <div style="overflow-x: auto;">
          <table style="width:100%; border-collapse:collapse;">
            <thead style="background:rgba(0,0,0,0.2);">
              <tr>
                <th style="padding:1rem; text-align:left; color:var(--text-muted);">Title</th>
                <th style="padding:1rem; text-align:left; color:var(--text-muted);">Subject</th>
                <th style="padding:1rem; text-align:left; color:var(--text-muted);">Downloads</th>
                <th style="padding:1rem; text-align:left; color:var(--text-muted);">Uploaded</th>
                <th style="padding:1rem; text-align:right; color:var(--text-muted);">Actions</th>
              </tr>
            </thead>
            <tbody id="uploads-table-body">
              <tr><td colspan="4" style="padding:2rem; text-align:center; color:var(--text-muted);">Fetching your uploads...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
<!-- EDIT DOCUMENT MODAL -->
 <div id="editDocModal" class="modal-overlay">
   <div class="modal-content pop-in">
     <div class="modal-header" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem;">
       <h2 class="gradient-text">Edit Resource</h2>
       <button class="modal-close" onclick="closeEditModal()" style="background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:1.2rem;">✕</button>
     </div>
     <form id="editDocForm">
       <input type="hidden" id="edit_note_id">
       <div class="form-group">
         <label>Resource Title</label>
         <input type="text" id="edit_title" class="form-input" required>
       </div>
       <div class="form-group">
         <label>Category</label>
         <select id="edit_category" class="form-input" required>
           <option value="Notes">Study Notes</option>
           <option value="PYQs">Previous Year Questions (PYQs)</option>
           <option value="Assignments">Assignments / Labs</option>
         </select>
       </div>
       <div style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 1.5rem;">
         <button type="button" class="cyber-btn cyber-btn-ghost" onclick="closeEditModal()">Cancel</button>
         <button type="submit" class="cyber-btn cyber-btn-success">Save Changes</button>
       </div>
     </form>
   </div>
 </div>

 <script src="/js/theme.js"></script>
<script src="/js/auth.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', async () => {
    const user = requireAuth();
    if (!user) return;
    renderSidebar('profile');
    try {
      const res = await fetch('/api/auth_manager?action=profile', { headers: getAuthHeaders() });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      document.getElementById('profile-name').textContent = data.user.name;
      document.getElementById('profile-email').textContent = data.user.email;
      document.getElementById('profile-avatar').textContent = (data.user.name || 'U').slice(0, 2).toUpperCase();
      if (data.user.role === 'admin') document.getElementById('profile-role').style.display = 'inline-block';
      const stars = '⭐'.repeat(Math.round(data.stats.avgRating)) + '☆'.repeat(5 - Math.round(data.stats.avgRating));
      document.getElementById('user-rating-stars').textContent = `${stars} (${data.stats.avgRating})`;
      document.getElementById('stat-uploads').textContent = data.stats.uploadCount;
      document.getElementById('stat-downloads').textContent = data.stats.totalDownloads;
      document.getElementById('stat-rating').textContent = data.stats.avgRating;
      const tbody = document.getElementById('uploads-table-body');
      tbody.innerHTML = '';
      if (data.documents.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" style="padding:2rem; text-align:center; color:var(--text-muted);">No documents uploaded yet.</td></tr>';
      } else {
        data.documents.forEach(doc => {
          const date = new Date(doc.uploaded_at).toLocaleDateString();
          tbody.innerHTML += `
            <tr id="doc-row-${doc.id}" style="border-bottom:1px solid var(--glass-border);">
              <td style="padding:1rem;"><a href="/view_document?id=${doc.id}" id="doc-title-${doc.id}" style="color:var(--accent); text-decoration:none; font-weight:600;">${escHtml(doc.title)}</a></td>
              <td style="padding:1rem;">${escHtml(doc.subject_name)}</td>
              <td style="padding:1rem;">${doc.download_count}</td>
              <td style="padding:1rem;">${date}</td>
              <td style="padding:1rem; text-align:right;">
                <div style="display:flex; gap:8px; justify-content:flex-end;">
                  <button onclick='openEditModal(${JSON.stringify(doc).replace(/'/g, "&apos;")})' class="cyber-btn" style="padding:6px 12px; font-size:0.7rem; background:var(--accent); border-color:var(--accent);">Rename / Edit</button>
                  <button onclick="confirmDelete(${doc.id})" class="cyber-btn cyber-btn-danger" style="padding:6px 12px; font-size:0.7rem;">Delete</button>
                </div>
              </td>
            </tr>
          `;
        });
      }
    } catch (err) {
      console.error(err);
      showToast('Failed to load profile data.', 'error');
    }
  });

  function openEditModal(doc) {
    document.getElementById('edit_note_id').value = doc.id;
    document.getElementById('edit_title').value = doc.title;
    document.getElementById('edit_category').value = doc.category || 'Notes';
    document.getElementById('editDocModal').classList.add('open');
  }

  function closeEditModal() {
    document.getElementById('editDocModal').classList.remove('open');
  }

  document.getElementById('editDocForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const id = document.getElementById('edit_note_id').value;
    const title = document.getElementById('edit_title').value;
    const category = document.getElementById('edit_category').value;

    try {
      const res = await fetch('/api/content', {
        method: 'POST',
        headers: getAuthHeaders(),
        body: JSON.stringify({ action: 'edit_note', note_id: id, title, category })
      });
      const result = await res.json();
      if (res.ok) {
        showToast('Resource updated successfully!', 'success');
        const titleEl = document.getElementById(`doc-title-${id}`);
        if (titleEl) titleEl.textContent = title;
        closeEditModal();
      } else {
        showToast(result.error || 'Update failed', 'error');
      }
    } catch (err) {
      showToast('Connection error', 'error');
    }
  });

  async function confirmDelete(id) {
    if (!confirm('Are you sure you want to delete this document?')) return;
    try {
      const res = await fetch('/api/content', {
        method: 'POST',
        headers: getAuthHeaders(),
        body: JSON.stringify({ action: 'delete_note', note_id: id })
      });
      const result = await res.json();
      if (res.ok) {
        showToast('Document deleted successfully.', 'success');
        const row = document.getElementById(`doc-row-${id}`);
        if (row) {
          row.style.opacity = '0';
          row.style.transform = 'translateX(-20px)';
          row.style.transition = 'all 0.5s ease';
          setTimeout(() => row.remove(), 500);
        }
      } else {
        showToast(result.error || 'Delete failed', 'error');
      }
    } catch (err) {
      showToast('Connection error', 'error');
    }
  }

</script>
</body>
</html>
