<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudyShare | Forgot Password</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <script>(function () { var t = localStorage.getItem('gsfc_theme') || 'dark'; document.documentElement.setAttribute('data-theme', t); })();</script>
</head>

<body>
  <div class="scanlines"></div>
  <div class="auth-page">
    <div class="auth-card fade-in">
      <div class="auth-logo" style="display: flex; flex-direction: column; align-items: center; margin-bottom: 2rem;">
        <div class="logo-wrapper"
          style="width: 60px; height: 60px; position: relative; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.03); border-radius: 18px; border: 1px solid var(--glass-border); margin-bottom: 1.5rem;">
          <svg width="40" height="40" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M50 20L15 35L50 50L85 35L50 20Z" fill="#FFB700" />
            <path d="M25 40V55C25 55 35 62 50 62C65 62 75 55 75 55V40" stroke="#FFB700" stroke-width="6"
              stroke-linecap="round" />
            <path d="M80 37V55" stroke="#FFB700" stroke-width="4" stroke-linecap="round" />
            <circle cx="80" cy="58" r="4" fill="#FFB700" />
            <path
              d="M65 45C65 40 60 35 50 35C40 35 35 40 35 45C35 50 40 55 50 57C65 60 70 65 70 75C70 85 62 90 50 90C38 90 30 85 30 75"
              stroke="currentColor" stroke-width="12" stroke-linecap="round" style="color: var(--text-main);" />
          </svg>
        </div>
        <h2 class="gradient-text" style="font-size: 1.8rem; margin-bottom: 0.5rem;">Reset Password</h2>
        <p style="color:var(--text-secondary); text-align: center; font-size: 0.9rem;">Enter your email to receive a
          reset code</p>
      </div>

      <div class="glass-panel">
        <div id="alert-container" style="display:none;"></div>

        <!-- Step 1: Request OTP -->
        <form id="forgot-form">
          <div class="form-group">
            <label for="f-email">University Email</label>
            <input id="f-email" class="form-input" type="email" placeholder="you@gsfcuniversity.ac.in" required
              autocomplete="email">
          </div>
          <button type="submit" class="cyber-btn cyber-btn-full" id="btn-send-otp">Send Reset Code</button>
        </form>

        <!-- Step 2: Reset Password (Hidden initially) -->
        <form id="reset-form" style="display:none;">
          <div class="form-group">
            <label for="r-otp">6-Digit Code</label>
            <input id="r-otp" class="form-input" type="text" maxlength="6" placeholder="123456" required
              style="letter-spacing: 4px; text-align: center; font-weight: bold; font-size: 1.2rem;">
          </div>
          <div class="form-group">
            <label for="r-pass">New Password</label>
            <input id="r-pass" class="form-input" type="password" placeholder="••••••••" minlength="8" required
              autocomplete="new-password">
          </div>
          <button type="submit" class="cyber-btn cyber-btn-success cyber-btn-full" id="btn-reset">Reset
            Password</button>
        </form>

        <div style="text-align:center; margin-top:1.5rem;">
          <a href="/" class="forgot-link">← Back to Login</a>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/auth.js"></script>
  <script>
    const forgotForm = document.getElementById('forgot-form');
    const resetForm = document.getElementById('reset-form');
    const alertContainer = document.getElementById('alert-container');
    let userEmail = '';

    forgotForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('f-email').value;
      const btn = document.getElementById('btn-send-otp');

      btn.disabled = true;
      btn.textContent = 'Sending...';

      try {
        const res = await fetch('/api/auth_manager', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'forgot', email: email })
        });
        const data = await res.json();

        if (res.ok) {
          userEmail = email;
          showAlert('Reset code sent! Please check your email.', 'success');
          forgotForm.style.display = 'none';
          resetForm.style.display = 'block';
        } else {
          showAlert(data.error || 'Failed to send reset code.');
        }
      } catch (err) {
        showAlert('Connection error. Is the server running?');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Send Reset Code';
      }
    });

    resetForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const otp = document.getElementById('r-otp').value;
      const pass = document.getElementById('r-pass').value;
      const btn = document.getElementById('btn-reset');

      btn.disabled = true;
      btn.textContent = 'Resetting...';

      try {
        const res = await fetch('/api/auth_manager', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'reset', email: userEmail, otp: otp, password: pass })
        });
        const data = await res.json();

        if (res.ok) {
          showAlert('Password reset successfully! Redirecting...', 'success');
          setTimeout(() => window.location.href = '/?success=Password updated. Please log in.', 2000);
        } else {
          showAlert(data.error || 'Invalid code or password.');
        }
      } catch (err) {
        showAlert('Connection error.');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Reset Password';
      }
    });

    function showAlert(msg, type = 'error') {
      alertContainer.innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
      alertContainer.style.display = 'block';
    }
  </script>
</body>

</html>
