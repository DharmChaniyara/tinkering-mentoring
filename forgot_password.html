<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudyShare | Password Reset</title>
  <link rel="stylesheet" href="/css/style.css">
  <script>(function(){var t=localStorage.getItem('gsfc_theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
</head>
<body>
<div class="scanlines"></div>
<div class="auth-page">
  <div class="auth-card fade-in">
    <div class="auth-logo">
      <h1 class="gradient-text" style="font-size:1.8rem;">StudyShare</h1>
      <p style="color:var(--text-secondary);">Reset Your Password</p>
    </div>
    <div class="glass-panel">
      <div id="alert-container" style="display:none;"></div>
      <form id="forgot-form" novalidate>
        <p style="margin-bottom:1.2rem;font-size:0.85rem;color:var(--text-muted);">
          Enter your university email address. A password reset link will be sent if it exists.
        </p>
        <div class="form-group">
          <label>Email Address</label>
          <input class="form-input" type="email" name="email" required placeholder="you@gsfcuniversity.ac.in">
        </div>
        <button type="submit" class="cyber-btn cyber-btn-full">Send Reset Link</button>
      </form>
      <div style="margin-top:1.5rem;text-align:center;">
        <a href="/?tab=login" class="forgot-link" style="display:inline-block;float:none;">Cancel &amp; Return</a>
      </div>
    </div>
    <div style="text-align:center;margin-top:1.5rem;">
      <button class="theme-toggle" onclick="toggleTheme()" id="themeToggle">☀️ Light</button>
    </div>
  </div>
</div>
<script src="/js/theme.js"></script>
<script src="/js/auth.js"></script>
<script>
  document.getElementById('forgot-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = e.target.querySelector('button[type="submit"]');
    btn.disabled = true; btn.textContent = 'Sending…';
    const res = await fetch('/api/forgot', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: e.target.email.value }),
    });
    const data = await res.json();
    btn.disabled = false; btn.textContent = 'Send Reset Link';
    showAlert(data.message || data.error, res.ok ? 'success' : 'error');
  });
</script>
</body>
</html>
