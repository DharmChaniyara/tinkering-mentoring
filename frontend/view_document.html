<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudyShare | View Document</title>
  <link rel="stylesheet" href="/css/style.css">
  <script>(function(){var t=localStorage.getItem('gsfc_theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
</head>
<body>
<div class="app-layout">
  <div id="sidebar-container"></div>
  <div class="main-content">
    <header class="topbar">
      <div style="display:flex;align-items:center;gap:12px;">
        <a id="back-link" href="/dashboard" class="cyber-btn cyber-btn-ghost" style="padding:8px 14px;font-size:0.85rem;">← Back</a>
        <div>
          <h3 id="doc-title-h3" style="font-size:1rem;font-weight:700;">Loading…</h3>
          <p id="doc-subject-p" style="font-size:0.75rem;color:var(--text-muted);"></p>
        </div>
      </div>
      <div class="topbar-actions">
        <button class="theme-toggle" onclick="toggleTheme()" id="themeToggle">☀️</button>
        <a id="download-btn" href="#" target="_blank" class="cyber-btn cyber-btn-success" style="font-size:0.85rem;padding:8px 16px;">⬇ Download</a>
      </div>
    </header>
    <div class="doc-viewer">
      <div class="doc-viewer-main" id="doc-viewer-main">
        <div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-muted);">
          <p>Loading document…</p>
        </div>
      </div>
      <div class="doc-viewer-sidebar">
        <div class="doc-info-header">
          <h2 id="info-title">…</h2>
          <div class="doc-subject" id="info-subject"></div>
        </div>
        <div class="doc-info-body">
          <div class="doc-meta-item">
            <div class="meta-icon">👤</div>
            <div class="meta-text"><div class="meta-label">Uploaded By</div><div class="meta-value" id="info-uploader">…</div></div>
          </div>
          <div class="doc-meta-item">
            <div class="meta-icon">📅</div>
            <div class="meta-text"><div class="meta-label">Upload Date</div><div class="meta-value" id="info-date">…</div></div>
          </div>
          <div class="doc-meta-item">
            <div class="meta-icon">📁</div>
            <div class="meta-text"><div class="meta-label">File Type</div><div class="meta-value" id="info-type" style="text-transform:uppercase;">…</div></div>
          </div>
          <div class="doc-meta-item" id="info-unit-row">
            <div class="meta-icon">📖</div>
            <div class="meta-text"><div class="meta-label">Syllabus Unit</div><div class="meta-value" id="info-unit">…</div></div>
          </div>
          <div class="doc-meta-item">
            <div class="meta-icon">📥</div>
            <div class="meta-text"><div class="meta-label">Downloads</div><div class="meta-value" id="info-downloads">…</div></div>
          </div>
          <div style="margin-top:1.5rem; padding-top:1.5rem; border-top:1px solid var(--glass-border);">
            <h4 style="font-size:0.85rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px;">Document Rating</h4>
            <div style="display:flex; align-items:center; gap:8px;">
              <div id="doc-rating-stars" class="rating-stars" style="color:#fbbf24; font-size:1.2rem; cursor:pointer;">
                <span data-star="1">☆</span><span data-star="2">☆</span><span data-star="3">☆</span><span data-star="4">☆</span><span data-star="5">☆</span>
              </div>
              <span id="doc-rating-avg" style="font-size:0.9rem; font-weight:600; color:var(--text-secondary);">0.0</span>
            </div>
          </div>
          <div style="margin-top:1.5rem; padding:1rem; background:rgba(255,255,255,0.03); border-radius:12px; border:1px solid var(--glass-border);">
            <h4 style="font-size:0.8rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px;">Uploader Rating</h4>
            <div style="display:flex; align-items:center; gap:8px; margin-bottom:8px;">
              <div id="user-rating-stars" style="color:#fbbf24; font-size:1rem; cursor:pointer;">
                <span data-star="1">☆</span><span data-star="2">☆</span><span data-star="3">☆</span><span data-star="4">☆</span><span data-star="5">☆</span>
              </div>
              <span id="user-rating-avg" style="font-size:0.85rem; color:var(--text-secondary);">0.0</span>
            </div>
            <button id="rate-user-btn" class="cyber-btn cyber-btn-ghost cyber-btn-full" style="font-size:0.75rem; padding:6px;">Rate Contributor</button>
          </div>
          <div style="margin-top:1.5rem;">
            <h4 style="font-size:0.85rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px;">Quick Actions</h4>
            <div style="display:flex;flex-direction:column;gap:8px;">
              <a id="download-btn-sidebar" href="#" target="_blank" class="cyber-btn cyber-btn-success cyber-btn-full" style="font-size:0.85rem;">⬇ Download File</a>
              <button onclick="document.getElementById('aiFab')?.click();" class="cyber-btn cyber-btn-full" style="font-size:0.85rem;">🤖 Ask AI About This</button>
              <a id="more-from-subject-btn" href="#" class="cyber-btn cyber-btn-ghost cyber-btn-full" style="font-size:0.85rem;">📚 More from this Subject</a>
              <button onclick="document.getElementById('reportDocModal').classList.add('open');" class="cyber-btn cyber-btn-ghost cyber-btn-full" style="font-size:0.85rem;color:var(--danger);border-color:rgba(239,68,68,0.3);margin-top:0.5rem;">🚩 Report Issue</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<div id="reportDocModal" class="modal-overlay">
  <div class="modal-content pop-in">
    <div class="modal-header">
      <h2 style="color:var(--danger);" class="gradient-text">Report Resource</h2>
      <button class="modal-close" onclick="document.getElementById('reportDocModal').classList.remove('open')">✕</button>
    </div>
    <form id="reportDocForm">
      <input type="hidden" name="note_id" id="report-note-id" value="">
      <div class="form-group"><label>Reason for reporting</label>
        <select name="reason" class="form-input" required>
          <option value="">-- Select Reason --</option>
          <option value="Incorrect Subject">Incorrect Subject mapping</option>
          <option value="Low Quality">Low quality or unreadable</option>
          <option value="Inappropriate Content">Inappropriate Content</option>
          <option value="Spam">Spam</option>
          <option value="Other">Other</option>
        </select>
      </div>
      <div class="form-group"><label>Additional Details</label><textarea name="details" class="form-input" rows="3" placeholder="Please provide more context about the issue..." required></textarea></div>
      <div style="display:flex;justify-content:flex-end;gap:10px;margin-top:1.5rem;">
        <button type="button" class="cyber-btn cyber-btn-ghost" onclick="document.getElementById('reportDocModal').classList.remove('open')">Cancel</button>
        <button type="submit" class="cyber-btn cyber-btn-danger">Submit Report</button>
      </div>
    </form>
  </div>
</div>
<script src="/js/theme.js"></script>
<script src="/js/app.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/view_document.js"></script>
</body>
</html>
