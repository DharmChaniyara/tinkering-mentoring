<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudyShare | Reset Password</title>
  <link rel="stylesheet" href="/css/style.css">
  <script>(function(){var t=localStorage.getItem('gsfc_theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
  <style>
    .otp-input { font-size: 2rem; font-weight: 800; letter-spacing: 0.75rem; text-align: center; font-family: 'Courier New', monospace; padding: 1rem; background: var(--card-bg, #111827); border: 2px solid #6366f1; border-radius: 10px; color: #a5b4fc; width: 100%; box-sizing: border-box; }
    .otp-input:focus { outline: none; border-color: #8b5cf6; box-shadow: 0 0 0 3px rgba(99,102,241,0.3); }
    .step-indicator { display: flex; justify-content: center; gap: 0.5rem; margin-bottom: 1.5rem; }
    .step-dot { width: 10px; height: 10px; border-radius: 50%; background: #374151; transition: all 0.3s; }
    .step-dot.active { background: #6366f1; transform: scale(1.2); }
    .step-dot.done { background: #10b981; }
    .resend-hint { text-align: center; margin-top: 0.75rem; font-size: 0.8rem; color: var(--text-muted, #6b7280); }
    .resend-hint button { background: none; border: none; color: #818cf8; cursor: pointer; font-size: 0.8rem; text-decoration: underline; }
  </style>
</head>
<body>
<div class="scanlines"></div>
<div class="auth-page">
  <div class="auth-card fade-in">
    <div class="auth-logo">
      <h1 class="gradient-text" style="font-size:1.8rem;">StudyShare</h1>
      <p style="color:var(--text-secondary);" id="page-subtitle">Reset your password</p>
    </div>
    <div class="glass-panel">
      <div id="alert-container" style="display:none;"></div>
      <div class="step-indicator">
        <div class="step-dot active" id="dot-1"></div>
        <div class="step-dot" id="dot-2"></div>
        <div class="step-dot" id="dot-3"></div>
      </div>
      <div id="step-1">
        <p style="font-size:0.9rem;color:var(--text-secondary);margin-bottom:1.2rem;">
          Enter your registered email address and we'll send you a 6-digit reset code.
        </p>
        <form id="email-form" novalidate>
          <div class="form-group">
            <label for="reset-email">University Email</label>
            <input id="reset-email" class="form-input" type="email" name="email" placeholder="you@gsfcuniversity.ac.in" required autocomplete="email">
          </div>
          <button type="submit" class="cyber-btn cyber-btn-full" style="margin-top:0.5rem;">Send Reset Code</button>
        </form>
        <div style="text-align:center;margin-top:1rem;"><a href="/" style="font-size:0.85rem;color:var(--text-muted);">← Back to Login</a></div>
      </div>
      <div id="step-2" style="display:none;">
        <p style="font-size:0.9rem;color:var(--text-secondary);margin-bottom:0.5rem;">
          Enter the 6-digit code sent to <strong id="email-display" style="color:#a5b4fc;"></strong> and your new password.
        </p>
        <form id="reset-form" novalidate>
          <div class="form-group" style="margin-top:1rem;">
            <label>6-Digit Reset Code</label>
            <input class="otp-input" type="text" name="otp" id="otp-field" placeholder="000000" maxlength="6" inputmode="numeric" pattern="\d{6}" required>
          </div>
          <div class="form-group">
            <label for="new-pass">New Password</label>
            <input id="new-pass" class="form-input" type="password" name="password" minlength="8" required placeholder="At least 8 characters" autocomplete="new-password">
          </div>
          <div class="form-group">
            <label for="confirm-pass">Confirm Password</label>
            <input id="confirm-pass" class="form-input" type="password" name="confirm" minlength="8" required placeholder="••••••••" autocomplete="new-password">
          </div>
          <button type="submit" class="cyber-btn cyber-btn-success cyber-btn-full">Reset Password</button>
        </form>
        <div class="resend-hint">Didn't get the code? <button id="resend-btn" onclick="resendCode()">Resend</button></div>
      </div>
      <div id="step-3" style="display:none;text-align:center;">
        <div style="font-size:3rem;margin-bottom:1rem;">✅</div>
        <h3 style="color:#10b981;margin:0 0 0.75rem;">Password Updated!</h3>
        <p style="color:var(--text-secondary);font-size:0.9rem;">Your password has been changed successfully.</p>
        <a href="/?tab=login" class="cyber-btn cyber-btn-success" style="display:inline-block;margin-top:1.5rem;">Go to Login →</a>
      </div>
    </div>
    <div style="text-align:center;margin-top:1.5rem;">
      <button class="theme-toggle" onclick="toggleTheme()" id="themeToggle">☀️ Light</button>
    </div>
  </div>
</div>
<script src="/js/theme.js"></script>
<script src="/js/auth.js"></script>
<script>
  let savedEmail = '';
  function setStep(n) {
    [1,2,3].forEach(i => {
      document.getElementById(`step-${i}`).style.display = i === n ? '' : 'none';
      const dot = document.getElementById(`dot-${i}`);
      dot.className = 'step-dot' + (i < n ? ' done' : i === n ? ' active' : '');
    });
    const subtitles = ['Reset your password', 'Enter your code', 'All done!'];
    document.getElementById('page-subtitle').textContent = subtitles[n - 1];
  }
  document.getElementById('email-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = e.target.querySelector('button[type="submit"]');
    btn.disabled = true; btn.textContent = 'Sending code…';
    savedEmail = document.getElementById('reset-email').value.trim();
    const res = await fetch('/api/auth_manager', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'forgot', email: savedEmail }),
    });
    const data = await res.json();
    btn.disabled = false; btn.textContent = 'Send Reset Code';
    showAlert(data.message || 'Code sent! Check your inbox.', 'success');
    document.getElementById('email-display').textContent = savedEmail;
    setStep(2);
  });
  document.getElementById('reset-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = e.target.querySelector('button[type="submit"]');
    btn.disabled = true; btn.textContent = 'Updating…';
    const otp = document.getElementById('otp-field').value.replace(/\s/g, '').trim();
    const password = document.getElementById('new-pass').value;
    const confirm = document.getElementById('confirm-pass').value;
    const res = await fetch('/api/auth_manager', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'reset', email: savedEmail, otp, password, confirm }),
    });
    const data = await res.json();
    btn.disabled = false; btn.textContent = 'Reset Password';
    if (res.ok) { setStep(3); } else { showAlert(data.error, 'error'); }
  });
  async function resendCode() {
    const btn = document.getElementById('resend-btn');
    btn.disabled = true; btn.textContent = 'Sending…';
    await fetch('/api/auth_manager', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'forgot', email: savedEmail }),
    });
    showAlert('A new code has been sent to your email.', 'success');
    setTimeout(() => { btn.disabled = false; btn.textContent = 'Resend'; }, 30000);
  }
</script>
</body>
</html>
